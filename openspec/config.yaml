project:
  name: pfmaster
  display_name: Peluclic
  description: Pet grooming and care management web application
  repository: https://github.com/XaviOutside/pfmaster
  created: 2026-06-21
  last_scanned: 2026-07-21

stack:
  language: TypeScript 5.6.3
  runtime: Node.js (tsx dev runtime)
  framework:
    frontend: React 19 + Vite 6
    backend: Express 4.21
    styling: Tailwind CSS v4
  orm: Prisma 5.22
  database: MySQL 8.0 (Docker)
  logging: Pino 9.5
  dev_environment: Docker Compose (api, app, db)
  detected_markers:
    - package.json with React 19, Express, Prisma, Vitest, Vite
    - prisma/schema.prisma (MySQL provider, FULLTEXT indexes, 5 models)
    - docker-compose.yml (3 services: api, app, db)
    - vite.config.ts (React + Tailwind plugins)
    - Clean Architecture bounded contexts: clients/, pets/, services/, appointments/, settings/, shared/
    - Atomic Design frontend: atoms/, molecules/, organisms/
    - ESLint v9 flat config (SonarQube, React hooks, TypeScript)

testing:
  runner: Vitest 2.1.3
  coverage_tool: "@vitest/coverage-v8"
  coverage_threshold: 80% lines (API)
  strict_tdd: true
  test_layers:
    - layer: API unit
      config: vitest.config.ts
      command: npm test
      count: 47 test files
      environment: node
    - layer: API integration
      config: vitest.integration.config.ts
      command: npm run test:integration
      count: 3 test files
      environment: node (forks, singleFork, 30s timeout)
      requires: Docker MySQL
    - layer: Frontend
      config: vitest.frontend.config.ts
      command: npm run test:frontend
      count: 49 test files
      environment: jsdom
    - layer: E2E
      framework: Playwright 1.61
      config: playwright.config.ts
      command: npx playwright test
      count: 3 spec files (283 lines)
      environment: chromium (headed CI)

conventions:
  code_style:
    typescript_strict: true
    functional_components: true
    enum_tinyint_mapping: true
    no_foreign_keys: true
    no_any_type: true
  naming:
    components: PascalCase
    utilities_hooks: camelCase
    db_columns: snake_case
    api_fields: camelCase
  linter: ESLint v9.39.4 (flat config — eslint.config.mjs)
  linter_plugins:
    - "@eslint/js (recommended)"
    - typescript-eslint (recommended)
    - sonarjs (recommended — cognitive complexity: 18 backend, 25 frontend)
    - react-hooks (recommended)
    - react (recommended)
    - react-refresh
  formatter: NOT_CONFIGURED
  type_checker: tsc (TypeScript compiler)
  commit_style: conventional
  pr_templates: github_default
  branch_strategy: undefined
  architecture:
    backend: Clean Architecture (domain → application → interface → infrastructure)
    frontend: Atomic Design (atoms → molecules → organisms → pages)
    bounded_contexts:
      - clients
      - pets
      - services
      - appointments
      - settings
    shared_modules:
      - shared/domain (BaseEntity, errors)
      - shared/infrastructure (Prisma client)
      - shared/utils (FTS sanitization)
      - observability (Pino logger)
    fts_search: MySQL FULLTEXT with MATCH AGAINST IN BOOLEAN MODE
    prices: integer cents
  adr_dir: docs/adr/
  adr_count: 1

artifacts:
  proposal_dir: openspec/changes
  spec_dir: openspec/changes
  design_dir: openspec/changes
  task_dir: openspec/changes
  archive_dir: openspec/changes/archive

persistence:
  mode: hybrid
  engram_enabled: true
  openspec_enabled: true
  engram_topic_key: sdd-init/peluclic
  sync_interval: session_close

strict_tdd_mode: true

