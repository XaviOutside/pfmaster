# ── Nginx — Peluclic Production ─────────────────────────────────
# Serves: frontend static files + reverse proxy to API

server {
    listen 80;
    server_name peluclic.app www.peluclic.app;

    # ── Frontend (SPA) ──────────────────────────────────────
    root /usr/share/nginx/html;
    index index.html;

    # Cache static assets aggressively (they have content hashes)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA fallback — todo lo que no sea archivo va a index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── API reverse proxy ───────────────────────────────────
    location /api/ {
        proxy_pass http://api:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts para requests largos (uploads de logo)
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
        client_max_body_size 2M;
    }

    # ── API health check ────────────────────────────────────
    location /health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # ── Gzip ────────────────────────────────────────────────
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 256;
}
