version: '3.9'

# ──────────────────────────────────────────────────────────────
# Production deployment — Contabo VPS
# ──────────────────────────────────────────────────────────────
# Start:   docker compose -f docker-compose.prod.yml up -d
# Stop:    docker compose -f docker-compose.prod.yml down
# Logs:    docker compose -f docker-compose.prod.yml logs -f api
# Restart: docker compose -f docker-compose.prod.yml restart api

services:
  # ── Backend API ────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.prod
    container_name: peluclic-api
    restart: unless-stopped
    ports:
      - '3000:3000'
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - DATABASE_URL=mysql://${DB_USER}:${DB_PASSWORD}@db:3306/${DB_NAME}
      - SENTRY_DSN=${SENTRY_DSN:-}
    volumes:
      - api_uploads:/app/api/uploads
    depends_on:
      db:
        condition: service_healthy
    networks:
      - peluclic-net
    healthcheck:
      test: ['CMD', 'node', '-e', "require('http').get('http://localhost:3000/api/v1/health',r=>{process.exit(r.statusCode===200?0:1)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ── Nginx (frontend static files + API reverse proxy) ──────
  web:
    image: nginx:1.27-alpine
    container_name: peluclic-web
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./docker/nginx.prod.conf:/etc/nginx/conf.d/default.conf:ro
      - web_dist:/usr/share/nginx/html:ro
      - certbot_www:/var/www/certbot:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - api
    networks:
      - peluclic-net
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost/health']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

  # ── Frontend Builder (one-shot, populates web_dist) ────────
  frontend-builder:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    container_name: peluclic-frontend-builder
    volumes:
      - web_dist:/dist
    command: ['sh', '-c', 'cp -r dist/* /dist/']
    networks:
      - peluclic-net

  # ── Database ───────────────────────────────────────────────
  db:
    image: mysql:8.0
    container_name: peluclic-db
    restart: unless-stopped
    env_file:
      - .env
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    ports:
      - '127.0.0.1:3306:3306' # solo localhost — nunca expuesto públicamente
    volumes:
      - db_data:/var/lib/mysql
      - ./docker/my.cnf:/etc/mysql/conf.d/custom.cnf:ro
    networks:
      - peluclic-net
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost', '-u', 'root', '-p${DB_ROOT_PASSWORD}']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  db_data:
  api_uploads:
  web_dist:
  certbot_www:

networks:
  peluclic-net:
    driver: bridge
