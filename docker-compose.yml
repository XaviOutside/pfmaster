version: '3.9'

services:
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile
    ports:
      - '3000:3000'
    env_file:
      - .env
    environment:
      DATABASE_URL: "mysql://${DB_USER}:${DB_PASSWORD}@db:3306/${DB_NAME}"
    volumes:
      - .:/app
      - /app/node_modules
    depends_on:
      db:
        condition: service_healthy
    networks:
      - pfmaster-net
    command: npm run dev

  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    ports:
      - '5173:5173'
    env_file:
      - .env
    environment:
      VITE_API_PROXY_TARGET: "http://api:3000"
      VITE_API_BASE_URL: "http://localhost:3000"
    volumes:
      - .:/app
      - /app/node_modules
    depends_on:
      - api
    networks:
      - pfmaster-net
    command: npx vite --host 0.0.0.0 --port 5173

  db:
    image: mysql:8.0
    env_file:
      - .env
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${DB_NAME:-pfmaster}
      MYSQL_USER: ${DB_USER:-pfmaster}
      MYSQL_PASSWORD: ${DB_PASSWORD:-pfmaster}
    ports:
      - '3306:3306'
    volumes:
      - db_data:/var/lib/mysql
      - ./docker/my.cnf:/etc/mysql/conf.d/custom.cnf:ro
    networks:
      - pfmaster-net
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost', '-u', 'root', '-p${DB_ROOT_PASSWORD:-rootpassword}']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  db_data:

networks:
  pfmaster-net:
    driver: bridge
