name: Deploy to Contabo VPS

on:
  push:
    branches: [main]
  workflow_dispatch: # permite deploy manual desde GitHub UI

concurrency:
  group: production
  cancel-in-progress: false

jobs:
  gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Lint
        run: npm run lint

      - name: TypeScript Build
        run: npm run build

      - name: Frontend Build
        run: npx vite build

      - name: Tests
        run: npm test
        env:
          DATABASE_URL: mysql://test:test@localhost:3306/test

  deploy:
    name: Deploy to Contabo
    runs-on: ubuntu-latest
    needs: gate
    if: success()

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.CONTABO_HOST }}
          username: ${{ secrets.CONTABO_USER }}
          key: ${{ secrets.CONTABO_SSH_KEY }}
          port: ${{ secrets.CONTABO_SSH_PORT || 22 }}
          script_stop: true
          script: |
            set -e

            # ── 1. Pull latest code ──────────────────────────────────
            cd /opt/peluclic
            git fetch origin main
            git reset --hard origin/main

            # ── 2. Build & restart containers ────────────────────────
            docker compose -f docker-compose.prod.yml down api app --timeout 10
            docker compose -f docker-compose.prod.yml build --no-cache api app
            docker compose -f docker-compose.prod.yml up -d --remove-orphans

            # ── 3. Run database migrations ───────────────────────────
            sleep 5
            docker compose -f docker-compose.prod.yml exec -T api npx prisma migrate deploy

            # ── 4. Health check ──────────────────────────────────────
            sleep 3
            curl -f --max-time 10 http://localhost:3000/api/v1/health || echo "⚠️ Health check failed"

            # ── 5. Show running containers ───────────────────────────
            docker compose -f docker-compose.prod.yml ps

            echo ""
            echo "✅ Deploy completado — $(date -u)"
